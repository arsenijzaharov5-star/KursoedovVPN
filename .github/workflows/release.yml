name: Release KursoedovVPN

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        shell: pwsh
        run: dotnet restore "v2rayN/v2rayN.sln"

      - name: Build (Release)
        shell: pwsh
        run: dotnet build "v2rayN/v2rayN.sln" -c Release --no-restore

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - name: Build xray-core (xray.exe)
        shell: pwsh
        run: |
          git clone https://github.com/XTLS/Xray-core.git xray-core
          cd xray-core
          git submodule update --init --recursive
          go env -w CGO_ENABLED=0
          go env -w GOOS=windows
          go env -w GOARCH=amd64
          go build -o ..\xray.exe .\main

      - name: Package KursoedovVPN.zip
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          # Pick the desktop app output exe (avoid grabbing tools/installers)
          $appExe = Get-ChildItem -Recurse -File -Filter "v2rayN.exe" |
            Where-Object { $_.FullName -match "v2rayN\\v2rayN\\bin\\Release" } |
            Select-Object -First 1

          if (-not $appExe) { throw "Cannot find app exe in v2rayN/v2rayN/bin/Release" }
          if (-not (Test-Path "xray.exe")) { throw "xray.exe not found in workspace root." }

          $appDir = Split-Path $appExe.FullName -Parent
          New-Item -ItemType Directory -Force -Path dist | Out-Null

          # Copy full app runtime folder (dll/json/deps + exe), then rename exe for branding
          Copy-Item "$appDir\*" dist\ -Recurse -Force
          if (-not (Test-Path "dist\v2rayN.exe")) { throw "dist\\v2rayN.exe missing after copy" }
          Move-Item dist\v2rayN.exe dist\KursoedovVPN.exe -Force

          # Ensure our xray core is present
          Copy-Item xray.exe dist\xray.exe -Force

          $readme = @(
            "KursoedovVPN (Windows portable)",
            "1) Распакуй архив в отдельную папку",
            "2) Запусти KursoedovVPN.exe",
            "3) Скопируй trojan:// ссылку в буфер",
            "4) Import from clipboard",
            "5) Включи System Proxy / подключись",
            "ALPN: h2,http/1.1"
          )
          Set-Content -Path dist\README.txt -Value $readme -Encoding utf8

          if (Test-Path KursoedovVPN.zip) { Remove-Item KursoedovVPN.zip -Force }
          Compress-Archive -Path dist\* -DestinationPath KursoedovVPN.zip -Force

          $hash = (Get-FileHash KursoedovVPN.zip -Algorithm SHA256).Hash.ToLower()
          "$hash  KursoedovVPN.zip" | Out-File -Encoding ascii SHA256SUMS.txt

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v0.1.${{ github.run_number }}"
          name: "KursoedovVPN v0.1.${{ github.run_number }}"
          files: |
            KursoedovVPN.zip
            SHA256SUMS.txt
