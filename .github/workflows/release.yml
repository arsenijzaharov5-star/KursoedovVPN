name: Release KursoedovVPN

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        shell: pwsh
        run: dotnet restore "v2rayN/v2rayN.sln"

      - name: Build (Release)
        shell: pwsh
        run: dotnet build "v2rayN/v2rayN.sln" -c Release --no-restore

      - name: Publish self-contained (win-x64)
        shell: pwsh
        run: |
          dotnet publish "v2rayN/v2rayN/v2rayN.csproj" -c Release -r win-x64 --self-contained true -p:PublishSingleFile=false -p:PublishTrimmed=false -o "v2rayN/v2rayN/publish-win-x64"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - name: Build xray-core (xray.exe)
        shell: pwsh
        run: |
          git clone https://github.com/XTLS/Xray-core.git xray-core
          cd xray-core
          git submodule update --init --recursive
          go env -w CGO_ENABLED=0
          go env -w GOOS=windows
          go env -w GOARCH=amd64
          go build -o ..\xray.exe .\main

      - name: Package app folder + portable zip
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          # Use self-contained publish output
          $appExe = Get-Item "v2rayN/v2rayN/publish-win-x64/v2rayN.exe" -ErrorAction SilentlyContinue
          if (-not $appExe) { throw "Cannot find app exe in v2rayN/v2rayN/publish-win-x64" }
          if (-not (Test-Path "xray.exe")) { throw "xray.exe not found in workspace root." }

          $appDir = Split-Path $appExe.FullName -Parent
          New-Item -ItemType Directory -Force -Path dist | Out-Null

          # Copy full app runtime folder (dll/json/deps + exe), then rename exe for branding
          Copy-Item "$appDir\*" dist\ -Recurse -Force
          if (-not (Test-Path "dist\v2rayN.exe")) { throw "dist\\v2rayN.exe missing after copy" }
          Move-Item dist\v2rayN.exe dist\KursoedovVPN.exe -Force

          # Ensure our xray core is present at expected path
          New-Item -ItemType Directory -Force -Path dist\bin\xray | Out-Null
          Copy-Item xray.exe dist\bin\xray\xray.exe -Force
          # routing datasets required by geosite/geoip rules
          Invoke-WebRequest -Uri "https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat" -OutFile "dist\bin\xray\geosite.dat"
          Invoke-WebRequest -Uri "https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat" -OutFile "dist\bin\xray\geoip.dat"
          # keep flat copy for compatibility with old layouts
          Copy-Item xray.exe dist\xray.exe -Force

          $readme = @(
            "KursoedovVPN (Windows)",
            "Запуск через installer: KursoedovVPN-Setup.exe",
            "Портативный запуск: KursoedovVPN.exe",
            "Импорт ключа: Import from clipboard",
            "ALPN: h2,http/1.1"
          )
          Set-Content -Path dist\README.txt -Value $readme -Encoding utf8

          if (Test-Path KursoedovVPN.zip) { Remove-Item KursoedovVPN.zip -Force }
          Compress-Archive -Path dist\* -DestinationPath KursoedovVPN.zip -Force

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          choco install innosetup -y --no-progress

          $iss = @(
            '[Setup]',
            'AppId={{2A8FAF48-6AA4-4E73-9A58-0DFDF76C0A31}}',
            'AppName=kursoedovVPN',
            'AppVersion=0.1.${{ github.run_number }}',
            'DefaultDirName={autopf}\kursoedovVPN',
            'DefaultGroupName=kursoedovVPN',
            'OutputDir=.',
            'OutputBaseFilename=KursoedovVPN-Setup',
            'Compression=lzma',
            'SolidCompression=yes',
            'WizardStyle=modern',
            'ArchitecturesInstallIn64BitMode=x64compatible',
            '',
            '[Files]',
            'Source: "dist\*"; DestDir: "{app}"; Flags: recursesubdirs ignoreversion',
            '',
            '[Icons]',
            'Name: "{group}\kursoedovVPN"; Filename: "{app}\KursoedovVPN.exe"',
            'Name: "{autodesktop}\kursoedovVPN"; Filename: "{app}\KursoedovVPN.exe"',
            '',
            '[Run]',
            'Filename: "{app}\KursoedovVPN.exe"; Description: "Запустить kursoedovVPN"; Flags: nowait postinstall skipifsilent'
          )
          Set-Content -Path installer.iss -Value $iss -Encoding utf8

          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: SHA256 sums
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $zipHash = (Get-FileHash KursoedovVPN.zip -Algorithm SHA256).Hash.ToLower()
          $setupHash = (Get-FileHash KursoedovVPN-Setup.exe -Algorithm SHA256).Hash.ToLower()
          @(
            "$zipHash  KursoedovVPN.zip",
            "$setupHash  KursoedovVPN-Setup.exe"
          ) | Out-File -Encoding ascii SHA256SUMS.txt

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v0.1.${{ github.run_number }}"
          name: "KursoedovVPN v0.1.${{ github.run_number }}"
          files: |
            KursoedovVPN.zip
            KursoedovVPN-Setup.exe
            SHA256SUMS.txt
