name: Release KursoedovVPN

on:
push:
branches: ["master"]
workflow_dispatch:

permissions:
contents: write

jobs:
build:
runs-on: windows-latest

steps:
- name: Checkout
uses: actions/checkout@v4

- name: Setup .NET
uses: actions/setup-dotnet@v4
with:
dotnet-version: "8.0.x"

- name: Locate solution
id: sln
shell: pwsh
run: |
$sln = Get-ChildItem -Recurse -Filter "*.sln" | Select-Object -First 1
if (-not $sln) { throw "No .sln file found in repository" }
"path=$($sln.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
Write-Host "Using solution: $($sln.FullName)"

- name: Restore
shell: pwsh
run: dotnet restore "${{ steps.sln.outputs.path }}"

- name: Build (Release)
shell: pwsh
run: dotnet build "${{ steps.sln.outputs.path }}" -c Release --no-restore

- name: Setup Go
uses: actions/setup-go@v5
with:
go-version: "1.22.x"

- name: Build xray-core (xray.exe)
shell: pwsh
run: |
git clone https://github.com/XTLS/Xray-core.git xray-core
cd xray-core
git submodule update --init --recursive
go env -w CGO_ENABLED=0
go env -w GOOS=windows
go env -w GOARCH=amd64
go build -o ..\xray.exe .\main

- name: Package KursoedovVPN.zip
shell: pwsh
run: |
$ErrorActionPreference = "Stop"

$exe = Get-ChildItem -Recurse -Filter "*.exe" |
Where-Object { $_.Name -match "v2rayN|KursoedovVPN" } |
Select-Object -First 1

if (-not $exe) { throw "Cannot find built exe. Check build output paths." }
if (-not (Test-Path "xray.exe")) { throw "xray.exe not found in workspace root." }

New-Item -ItemType Directory -Force -Path dist | Out-Null
Copy-Item $exe.FullName dist\KursoedovVPN.exe -Force
Copy-Item xray.exe dist\xray.exe -Force

$readme = @(
"KursoedovVPN (Windows portable)",
"1) Запусти KursoedovVPN.exe",
"2) Скопируй trojan:// ссылку в буфер",
"3) Import from clipboard",
"4) Включи System Proxy / подключись",
"ALPN: h2,http/1.1"
)
Set-Content -Path dist\README.txt -Value $readme -Encoding utf8

if (Test-Path KursoedovVPN.zip) { Remove-Item KursoedovVPN.zip -Force }
Compress-Archive -Path dist\* -DestinationPath KursoedovVPN.zip -Force

$hash = (Get-FileHash KursoedovVPN.zip -Algorithm SHA256).Hash.ToLower()
"$hash KursoedovVPN.zip" | Out-File -Encoding ascii SHA256SUMS.txt

- name: Release
uses: softprops/action-gh-release@v2
with:
tag_name: "v0.1.${{ github.run_number }}"
name: "KursoedovVPN v0.1.${{ github.run_number }}"
files: |
KursoedovVPN.zip
SHA256SUMS.txt
